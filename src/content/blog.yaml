items:
  - titleHe: לנשום אל תוך הרגע
    dateHe: יוני 2026
    excerptHe: >-
      איך נשימה אחת מודעת יכולה לשנות את כל מערכת היחסים שלנו עם הגוף — תרגול
      קטן שאפשר לקחת לכל מקום.
    bodyHe: |-
      זה טקסט לדוגמה — כאן את כותבת את המאמר המלא, בדיוק כמו פוסט.
      אפשר לכתוב כמה פסקאות שרוצים, והן יוצגו יפה כשנכנסים לקרוא.

      כדי להתחיל פסקה חדשה — פשוט משאירים שורה ריקה ביניהן.
      הטקסט הזה הוא רק הדגמה; אפשר למחוק אותו ולכתוב את שלך.
    url: ""
  - titleHe: אינטימיות מתחילה בהקשבה
    dateHe: מאי 2026
    excerptHe: >-
      מה קורה כשמפסיקים לתקן ומתחילים להקשיב — על קרבה, גבולות ותקשורת בזוגיות.
    bodyHe: |-
      טקסט לדוגמה למאמר השני. כאן מרחב פתוח לכתיבה חופשית.

      אפשר לספר סיפור, לשתף תובנה, או להזמין לתהליך.
    url: ""
  - titleHe: הגוף זוכר
    dateHe: אפריל 2026
    excerptHe: >-
      תנועה כשפה של ריפוי — איך אנחנו פוגשים מקומות תקועים ומשחררים אותם בעדינות.
    bodyHe: |-
      טקסט לדוגמה למאמר השלישי.

      אפשר להחליף את כל התוכן הזה במאמר אמיתי דרך מערכת העריכה.
    url: ""
