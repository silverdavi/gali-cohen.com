aboutSection:
  label: About
  title: The long way back to the body
  photo: /photos/about.jpg
  photoAlt: A portrait of Gali smiling, white bougainvillea behind her
  paragraphs:
    - >-
      I came to this work the long way — through psychology and sociology at
      university, through years of teaching yoga and training bodies, and
      through my own winding road back to mine.
    - >-
      Today I accompany individuals and couples in emotional and body-based
      processes from my clinic in Tel Aviv, and hold workshops and circles
      around the country. An eternal student, as my teachers like to remind me.
  facts:
    - label: Practice
      value: Holistic, emotional & body-based therapy
    - label: Training
      value: B.A. Psychology & Sociology · certified yoga teacher
    - label: Where
      value: Tel Aviv clinic · workshops countrywide
    - label: Languages
      value: Hebrew · English

storySection:
  label: The talk
  title: Body, Faith & Redemption
  lead: >-
    Gali Geula’s personal story — from an ultra-orthodox girl who never quite
    fit, searching for her place in the world, to finding God in the most
    unexpected places.
  paragraphs:
    - >-
      A life that moves through travels across the world, meditation, stripping,
      tantra and psychedelics — through darkness, searching, stubbornness and
      despair, and also through a great deal of light: angels along the way,
      revelation, faith and hope.
    - >-
      The evening opens with a short dance, continues with the personal story,
      and deepens into an open, honest conversation with the audience. It closes
      with a song that is a prayer and a thanksgiving.
  meta: About two hours · by invitation
  photos:
    - src: /photos/story-1.jpg
      alt: Gali holding a protest sign — “the stigma kills”
    - src: /photos/story-2.jpg
      alt: Gali performing on stage under stage lights
    - src: /photos/story-3.jpg
      alt: Gali backstage before a performance

wordsSection:
  label: Words from the room
  items:
    - quote: >-
        Hi dear, I wanted to thank you for the workshop yesterday. It was so
        connecting, gentle and moving, both alone and together. Full of soft
        inward movement and listening and healing, in your own unique way.
        Connecting inward at a listening pace, slowly meeting places with kind
        eyes and compassion. It simply releases stuck places that ask for a new
        relationship... and so much intimacy, and the connecting, attentive
        communication between two, wow. Thank you so much for this 💗
      name: Participant · couples workshop
    - quote: >-
        Hi Gali, I wanted you to know the workshop was amazing! I didn’t expect a
        movement workshop to be so meaningful and deep. At first there were
        awkward moments, dancing in front of strangers... but the way you held
        it helped me let go and ease into it slowly. You have a calm, soothing
        voice. Near the end I dropped into a kind of meditation, and suddenly
        tears came. Like something released in me. Thank you ✨💚
      name: Participant · movement workshop
    - quote: >-
        This morning we all woke up in a foul mood, a messy morning where nothing
        worked, and I really felt stuck. Then I remembered the challenge you gave
        at the end of the workshop, to put on five minutes of music and dance,
        and I decided it was probably the only thing I could do when everything
        felt wrong. I started with “Nigun Berditchev” that you played for us,
        then moved to “Release Control”, and the day stayed frustrating with an
        unreasonable string of glitches, yet everything was a little better
        because of it. Mostly I wanted to say thank you - for the experience, the
        challenge, and the reminder that I have tools even when I feel completely
        helpless. 💜
      name: Participant · “Feminine Fire”
    - quote: >-
        Gali! It was stunning and truly thank you. Your presence is incredibly
        calming, it gives confidence and space. Thank you for an amazing
        experience ☺️
      name: Participant · circle
    - quote: >-
        Gali! I’ve kept up the hour-long meditation every day and I feel really,
        really good, what is this thing! So grateful you introduced me to it.
        Thank you, you truly do wonders! 🙏🙏🙏🙏
      name: Participant · one-on-one

