wordsSection:
  label: Words from the room
  items:
    - quote: >-
        I arrived holding my breath without knowing it. I left breathing. It
        sounds small written down. It was not small.
      name: N., breathwork journey
    - quote: >-
        Gali holds a room the way you hold a sleeping child: completely, and
        without making a thing of it.
      name: A. & D., couples workshop

