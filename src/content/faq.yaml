# FAQ — edited in the CMS ("שאלות נפוצות · FAQ"). Placeholder answers — replace
# with Gali's real wording. He is the live language; En kept for a future switch.
heading:
  labelHe: שאלות נפוצות
  labelEn: FAQ
  titleHe: שאלות שנשאלות הרבה
  titleEn: Questions I hear often
  subHe: ואם נשאר משהו פתוח — מוזמנים פשוט לכתוב לי.
  subEn: And if something is still open — just write to me.
items:
  - qHe: מה זה בעצם טיפול גוף-נפש ומיניות קשובה?
    qEn: What is body-mind and mindful-sexuality work?
    aHe: >-
      מרחב בטוח לפגוש את הגוף, הרגש והנשימה — דרך נוכחות, תנועה ומגע מותאם.
      העבודה היא תהליכית ומכבדת, תמיד בקצב שלכם ובהסכמה מלאה.
    aEn: >-
      A safe space to meet body, emotion and breath — through presence, movement
      and attuned touch. The work is gradual and respectful, always at your pace
      and with full consent.
  - qHe: הטיפול מתאים ליחידים או לזוגות?
    qEn: Is this for individuals or couples?
    aHe: >-
      לשניהם. אני מלווה נשים בתהליך אישי, וגם זוגות שמבקשים קרבה, תקשורת
      ואינטימיות עמוקה יותר. נתאים יחד את המסגרת הנכונה עבורכם.
    aEn: >-
      Both. I accompany women in personal processes, and couples seeking closeness,
      communication and deeper intimacy. We'll find the right frame together.
  - qHe: יש שיחת היכרות לפני שמתחילים?
    qEn: Is there an intro call before we start?
    aHe: >-
      כן. שיחת היכרות קצרה וללא עלות — נכיר, תספרו מה מביא אתכם, ונבדוק יחד
      אם והאיך נכון להמשיך.
    aEn: >-
      Yes. A short, free intro call — we get to know each other, you share what
      brings you, and we see together whether and how to continue.
  - qHe: איפה מתקיימים המפגשים?
    qEn: Where do sessions take place?
    aHe: >-
      בקליניקה שלי בתל אביב, וכן בסדנאות ומעגלים במקומות שונים בארץ. מפגשי
      היכרות אפשר לקיים גם בטלפון או בזום.
    aEn: >-
      At my clinic in Tel Aviv, and in workshops and circles around the country.
      Intro calls can be by phone or video.
  - qHe: כמה נמשך מפגש?
    qEn: How long is a session?
    aHe: >-
      מפגש אישי נמשך כשעה וחצי. סדנאות ומעגלים משתנים באורכם — הפרטים מופיעים
      לצד כל אירוע.
    aEn: >-
      A personal session is about ninety minutes. Workshops and circles vary —
      details appear alongside each event.
  - qHe: איך קובעים?
    qEn: How do I book?
    aHe: >-
      הכי פשוט בוואטסאפ — כתבו לי מילה ונמצא יחד את הזמן והדרך שמתאימים לכם.
    aEn: >-
      Easiest on WhatsApp — drop me a line and we'll find the time and path that
      fit you.
