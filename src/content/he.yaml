storySection:
  label: ההרצאה
  title: גוף, אמונה וגאולה
  lead: >-
    סיפורה האישי של גלי גאולה — מילדה חרדית ושונה שמחפשת את מקומה
    בעולם, ועד למציאת אלוהים במקומות לא צפויים.
  paragraphs:
    - >-
      מסע חיים שעובר דרך מסעות בעולם, מדיטציות, חשפנות, טנטרה
      ופסיכדליה — דרך חושך, חקירה, עקשנות וייאוש, וגם דרך הרבה אור:
      מלאכים בדרך, גילוי, אמונה ותקווה.
    - >-
      המפגש נפתח במופע ריקוד קצר, ממשיך בסיפור אישי, ומעמיק לשיח
      פתוח ואותנטי עם הקהל. הערב נחתם בשיר שהוא תפילה והודיה.
  meta: משך המפגש כשעתיים · להזמנה
  photos:
    - src: /photos/story-1.jpg
      alt: גלי מחזיקה שלט מחאה — "הסטיגמה הורגת"
    - src: /photos/story-2.jpg
      alt: גלי על במה במופע, אורות במה
    - src: /photos/story-3.jpg
      alt: גלי מאחורי הקלעים לפני מופע

wordsSection:
  label: מילים מהחדר
  items:
    - quote: >-
        היה כל כך מחבר, נעים ומרגש — בלבד ובביחד. מלא תנועה רכה
        פנימה והקשבה, בדרך הייחודית שלך. זה משחרר מקומות תקועים
        שמבקשים יחס חדש.
      name: משתתפת · סדנה זוגית
    - quote: >-
        לא ציפיתי שסדנת תנועה תהיה כל כך משמעותית ועמוקה. הקול שלך
        נעים ומרגיע, ולקראת הסוף נכנסתי למעין מדיטציה — פתאום עלו
        דמעות. כאילו משהו השתחרר בי.
      name: משתתפת · סדנת תנועה
    - quote: >-
        נזכרתי באתגר שנתת בסוף הסדנה — חמש דקות של מוזיקה וריקוד.
        ביום מתסכל זה היה הדבר היחיד שיכולתי לעשות, והכול נעשה קצת
        יותר טוב. תודה על התזכורת שיש לי כלים גם כשאני מרגישה חסרת אונים.
      name: משתתפת · "אש נשית"
    - quote: >-
        הנוכחות שלך נעימה בטירוף — נותנת ביטחון ומרחב. תודה על חוויה
        מדהימה.
      name: משתתפת · מעגל
    - quote: >-
        המשכתי כל יום במדיטציה ואני מרגיש טוב כל כך. כל כך מודה
        שהכרת לי את זה — את באמת עושה נפלאות.
      name: משתתף · ליווי אישי

