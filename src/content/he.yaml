storySection:
  label: הרצאה
  title: ההרצאה- גוף, אמונה וגאולה
  lead: |-
    גוף, אמונה וגאולה

    סיפורה האישי של גלי גאולה - 
    מילדה חרדית ושונה, שמחפשת את מקומה בעולם,
    דרך מסעות בעולם, מדיטציות, חשפנות, טנטרה ופסיכדליה,
    ועד למציאת אלוהים במקומות לא צפויים.
  paragraphs:
    - |-
      זהו מסע חיים שעובר דרך חושך, חקירה, עקשנות וייאוש,
      וגם דרך הרבה אור -
      מלאכים בדרך, גילוי, אמונה ותקווה.

      המפגש נפתח במופע ריקוד קצר,
      ממשיך בסיפור אישי,
      ומעמיק לשיח פתוח ואותנטי עם הקהל - שאלות ותשובות.

      הערב נחתם בשיר שהוא תפילה והודיה.
  meta: משך המפגש כשעתיים · להזמנה
  photos:
