wordsSection:
  label: המלצות
  items:
    - quote: היי יקרה, רציתי להגיד לך תודה על הסדנא אתמול. היה כל כך מחבר, פוגש, נעים ומרגש, ממש בלבד ובביחד. מלא תנועה רכה פנימה והקשבה ומלא ריפוי, בדרך שלך הייחודית. לחבר פנימה בקצב קשוב, ולאט לאט לפגוש מקומות עם עיניים טובות וחמלה. בפשטות זה משחרר מקומות תקועים שמבקשים יחס חדש... ומלא אינטימיות, ועל התקשורת המחברת והקשובה בשניים וואוו. ממש תודה על זה 💗
      name: משתתף · סדנת "מיינדפול- דאנס לזוגות"
    - quote: היי גלי, רציתי שתדעי שהיה לי מדהים בסדנה! לא ציפיתי שסדנת תנועה תהיה לי ככה משמעותית ועמוקה. בהתחלה היו רגעים מביכים, לרקוד בנוכחות א.נשים זרים... אבל איך שהעברת את זה, עזר לי להשתחרר ולהכנס לזה לאט לאט. יש לך קול נעים ומרגיע. בחלק של הסוף נכנסתי למעין מדיטציה, פתאום עלו לי דמעות. כאילו משהו השתחרר אצלי. תודה ✨💚
      name: משתתפת · סדנת תנועה
    - quote: הבוקר כולנו קמנו במצב רוח מעפן, בוקר מלא בלגן ודברים שלא עבדו, וממש הרגשתי שאני לא מצליחה לצאת מזה. ואז נזכרתי באתגר שנתת לי בסיום הסדנה, לשים חמש דקות של מוזיקה ולרקוד, והחלטתי שזה כנראה הדבר היחיד שאני יכולה לעשות כשהכל מרגיש לא נכון. התחלתי עם "ניגון ברדיצ׳ב" שהשמעת לנו, ואז עברתי ל"Release Control", והמשיך לי יום מתסכל עם אוסף בלתי סביר של תקלות, ועדיין הכל היה קצת יותר טוב בזכותו. רציתי בעיקר להגיד תודה - על החוויה, על האתגר, ועל התזכורת שיש לי כלים גם כשאני מרגישה חסרת אונים לחלוטין. 💜
      name: משתתפת · סדנת "מיינדפול דאנס" בפסטיבל "אש נשית"
    - quote: גלי! היה מהמם וממש תודה. הנוכחות שלך נעימה בטירוף, נותנת ביטחון ומרחב. תודה על חוויה מדהימה ☺️
      name: משתתפת · מדיטציית הלביאות
    - quote: גלי! המשכתי כל יום במדיטציה של השעה ואני מרגיש מאוד מאוד טוב, מה זה הדבר הזהההה. כל כך מוקיר תודה שהכרת לי את זה! תודה, את באמת עושה נפלאות! 🙏🙏🙏🙏
      name: משתתף · ליווי אישי
    - quote: |-
        תודות על אתמול, היה משמעותי.
        הרגיש נינוח ונוח עד כדי קיצון.
        תודות על האינטימיות והחזקת המרחב.
      name: משתתף · "מיינדפול דאנס לזוגות"
    - quote: המון תודה על אתמול גלי. היה מדהים ואת מנחה בחסד, בגובה העיניים, בנעימות ובלב טוב  ❤️
      name: משתתפת · מדיטציית קונדליני
    - quote: |-
        לא יודע מה קרה אבל זו היום הולדת הכי טוב שהייתה לה. 
        כמובן לקחנו את הטיפים לתשומת ליבנו.
        שוב, תודה רבה על היחס והטיפים.
        ב"ה זה עבד..
      name: משתתף · סדנת טנטרה פרטית לזוגות
    - quote: |-
        גלי רציתי להגיד לך תודה רבה על הסדנא שעשינו. 
        פתחת אותי לראות דברים בצורה אחרת ולהבין יותר את הגוף שלי.
      name: משתתף · סדנת "מיינדפול דאנס"
    - quote: תודה על המידע ותודה גם על הסדנא. היה מעל ומעבר לציפיות 🙏
      name: משתתפת · סדנת טנטרה פרטית לזוגות
    - quote: |-
        גלי! היה מהמם וממש תודה
        הנוכחות שלך נעימה בטירוף
        נותנת ביטחון ומרחב
        תודה על חוויה מדהימה 😊
      name: משתתפת · סדנת "מיינדפול דאנס לזוגות"
    - quote: |-
        תודה רבה על היום! היה לנו מהמם, סופר מחבר ונעים. 
        מקווים לקחת איתנו דברים קטנים שיעשו שינוי לאט לאט.
        סופשבוע נעים ❤️
      name: משתתפת · סדנת טנטרה פרטית לזוגות
