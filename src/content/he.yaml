  label: אודות
  title: כמה מילים עליי
  photo: /photos/רוקדתת.jpg
  photoAlt: דיוקן של גלי מחייכת, על רקע פריחה לבנה
  paragraphs:
    - |-
      הדרך שלי החלה מתוך מסע אישי של חיפוש, ריפוי וחיבור מחדש לגוף. 
      היום אני מלווה נשים וזוגות המבקשים לחיות ביותר נוכחות, אינטימיות, חופש ואהבה.
    - אני מאמינה שהגוף הוא שער לחיבור, לריפוי ולחיים מלאים יותר. דרך מיניות קשובה, נשימה, תנועה ונוכחות, אני מלווה אנשים בדרך לקרבה עמוקה יותר לעצמם, לגופם ולמערכות היחסים שלהם
