storySection:
  label: ההרצאה
  title: גוף, אמונה וגאולה
  lead: >-
    סיפורה האישי של גלי גאולה — מילדה חרדית ושונה שמחפשת את מקומה
    בעולם, ועד למציאת אלוהים במקומות לא צפויים.
  paragraphs:
    - >-
      מסע חיים שעובר דרך מסעות בעולם, מדיטציות, חשפנות, טנטרה
      ופסיכדליה — דרך חושך, חקירה, עקשנות וייאוש, וגם דרך הרבה אור:
      מלאכים בדרך, גילוי, אמונה ותקווה.
    - >-
      המפגש נפתח במופע ריקוד קצר, ממשיך בסיפור אישי, ומעמיק לשיח
      פתוח ואותנטי עם הקהל. הערב נחתם בשיר שהוא תפילה והודיה.
  meta: משך המפגש כשעתיים · להזמנה
  photos:
    - src: /photos/story-1.jpg
      alt: גלי מחזיקה שלט מחאה — "הסטיגמה הורגת"
    - src: /photos/story-2.jpg
      alt: גלי על במה במופע, אורות במה
    - src: /photos/story-3.jpg
      alt: גלי מאחורי הקלעים לפני מופע

wordsSection:
  label: מילים מהחדר
  items:
    - quote: >-
        היי יקרה, רציתי להגיד לך תודה על הסדנא אתמול. היה כל כך מחבר,
        פוגש, נעים ומרגש, ממש בלבד ובביחד. מלא תנועה רכה פנימה והקשבה
        ומלא ריפוי, בדרך שלך הייחודית. לחבר פנימה בקצב קשוב, ולאט לאט
        לפגוש מקומות עם עיניים טובות וחמלה. בפשטות זה משחרר מקומות
        תקועים שמבקשים יחס חדש... ומלא אינטימיות, ועל התקשורת המחברת
        והקשובה בשניים וואוו. ממש תודה על זה 💗
      name: משתתפת · סדנה זוגית
    - quote: >-
        היי גלי, רציתי שתדעי שהיה לי מדהים בסדנה! לא ציפיתי שסדנת תנועה
        תהיה לי ככה משמעותית ועמוקה. בהתחלה היו רגעים מביכים, לרקוד
        בנוכחות א.נשים זרים... אבל איך שהעברת את זה, עזר לי להשתחרר
        ולהכנס לזה לאט לאט. יש לך קול נעים ומרגיע. בחלק של הסוף נכנסתי
        למעין מדיטציה, פתאום עלו לי דמעות. כאילו משהו השתחרר אצלי. תודה ✨💚
      name: משתתפת · סדנת תנועה
    - quote: >-
        הבוקר כולנו קמנו במצב רוח מעפן, בוקר מלא בלגן ודברים שלא עבדו,
        וממש הרגשתי שאני לא מצליחה לצאת מזה. ואז נזכרתי באתגר שנתת לי
        בסיום הסדנה, לשים חמש דקות של מוזיקה ולרקוד, והחלטתי שזה כנראה
        הדבר היחיד שאני יכולה לעשות כשהכל מרגיש לא נכון. התחלתי עם "ניגון
        ברדיצ׳ב" שהשמעת לנו, ואז עברתי ל"Release Control", והמשיך לי יום
        מתסכל עם אוסף בלתי סביר של תקלות, ועדיין הכל היה קצת יותר טוב
        בזכותו. רציתי בעיקר להגיד תודה - על החוויה, על האתגר, ועל התזכורת
        שיש לי כלים גם כשאני מרגישה חסרת אונים לחלוטין. 💜
      name: משתתפת · "אש נשית"
    - quote: >-
        גלי! היה מהמם וממש תודה. הנוכחות שלך נעימה בטירוף, נותנת ביטחון
        ומרחב. תודה על חוויה מדהימה ☺️
      name: משתתפת · מעגל
    - quote: >-
        גלי! המשכתי כל יום במדיטציה של השעה ואני מרגיש מאוד מאוד טוב,
        מה זה הדבר הזהההה. כל כך מוקיר תודה שהכרת לי את זה! תודה, את
        באמת עושה נפלאות! 🙏🙏🙏🙏
      name: משתתף · ליווי אישי

