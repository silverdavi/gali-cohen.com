aboutSection:
  label: אודות
  title: הדרך הארוכה חזרה אל הגוף
  photo: /photos/about.jpg
  photoAlt: דיוקן של גלי מחייכת, על רקע פריחה לבנה
  paragraphs:
    - >-
      הגעתי לעבודה הזאת בדרך הארוכה: דרך פסיכולוגיה וסוציולוגיה
      באוניברסיטה, דרך שנים של הוראת יוגה ואימון גוף, ודרך הדרך
      המתפתלת שלי חזרה אל הגוף שלי.
    - >-
      היום אני מלווה יחידים וזוגות בתהליכים רגשיים וגופניים בקליניקה
      שלי בתל אביב, ומנחה סדנאות ומעגלים ברחבי הארץ. תלמידה נצחית,
      כמו שהמורות שלי אוהבות להזכיר לי.
  facts:
    - label: טיפול
      value: טיפול הוליסטי, רגשי וגופני
    - label: הכשרה
      value: תואר ראשון בפסיכולוגיה וסוציולוגיה · מורה מוסמכת ליוגה
