# Sveltia CMS configuration for galigeula.com (admin at /admin)
# -----------------------------------------------------------------------------
# LIVE LOGIN (no server, no OAuth app):
#   Open https://galigeula.com/admin, click "Sign In with Token", follow the
#   link to GitHub (scopes are pre-selected), generate a token, paste it back.
#   The browser remembers it — that token is effectively the password.
#   The GitHub account must have write access to the repo. See CMS-SETUP.md.
#
# LOCAL EDITING (no login, no proxy — Chromium browser):
#   npm run dev, open http://localhost:5173/admin/, click "Work with Local
#   Repository" and pick the repo folder.
#
# The whole site is Hebrew, so every field below is Hebrew only — no English.

backend:
  name: github
  repo: silverdavi/gali-cohen.com
  branch: main
  auth_methods: [token]

media_folder: "public/photos"
public_folder: "/photos"

locale: he

singletons:
  - name: activities
    label: "שירותי העסק"
    file: "src/content/activities.yaml"
    icon: self_improvement
    fields:
      - label: "כותרת הקטע"
        name: heading
        widget: object
        collapsed: true
        fields:
          - { label: "תווית קטנה", name: labelHe, widget: string }
          - { label: "כותרת", name: titleHe, widget: string }
          - { label: "כותרת משנה", name: subHe, widget: string, required: false }
      - label: "שירותים"
        name: items
        widget: list
        summary: "{{fields.titleHe}}"
        hint: "אפשר להוסיף / להסיר שירותים לפי תקופות בעזרת + / סל המחזור."
        fields:
          - { label: "שם השירות", name: titleHe, widget: string }
          - { label: "שורת פרטים (למשל: אחד על אחד · 75 דקות)", name: noteHe, widget: string }
          - { label: "תיאור מלא", name: bodyHe, widget: text }
          - { label: "מחיר (אופציונלי, למשל: 360 ₪)", name: price, widget: string, required: false }
          - { label: "תמונה", name: photo, widget: image }
          - { label: "תיאור התמונה (לנגישות)", name: photoAltHe, widget: string }

  - name: events
    label: "יומן מתעדכן"
    file: "src/content/events.yaml"
    icon: event
    fields:
      - label: "כותרת הקטע"
        name: heading
        widget: object
        collapsed: true
        fields:
          - { label: "תווית קטנה", name: labelHe, widget: string }
          - { label: "כותרת", name: titleHe, widget: string }
          - { label: "כותרת משנה", name: subHe, widget: string, required: false }
          - { label: "תווית כפתור", name: ctaHe, widget: string }
      - label: "אירועים"
        name: items
        widget: list
        summary: "{{fields.date}} — {{fields.titleHe}}"
        fields:
          - { label: "תאריך", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
          - { label: "שעה (למשל 19:30)", name: time, widget: string, required: false }
          - { label: "שם האירוע", name: titleHe, widget: string }
          - { label: "מיקום", name: locationHe, widget: string }
          - { label: "תיאור", name: descHe, widget: text }
          - { label: "קישור להרשמה", name: signupUrl, widget: string, required: false, hint: "אם ריק — מפנה לוואטסאפ." }

  - name: blog
    label: "בלוג ומאמרים"
    file: "src/content/blog.yaml"
    icon: article
    fields:
      - label: "כותרת הקטע"
        name: heading
        widget: object
        collapsed: true
        fields:
          - { label: "תווית קטנה", name: labelHe, widget: string }
          - { label: "כותרת", name: titleHe, widget: string }
          - { label: "כותרת משנה", name: subHe, widget: string, required: false }
          - { label: "תווית 'לקריאה'", name: ctaHe, widget: string }
      - label: "מאמרים"
        name: items
        widget: list
        summary: "{{fields.titleHe}}"
        fields:
          - { label: "כותרת המאמר", name: titleHe, widget: string }
          - { label: "תאריך (למשל: יוני 2026)", name: dateHe, widget: string, required: false }
          - { label: "תקציר קצר (מוצג בכרטיס)", name: excerptHe, widget: text }
          - { label: "תוכן המאמר (הפוסט המלא)", name: bodyHe, widget: text, required: false, hint: "כתבי כאן את המאמר המלא — הוא נפתח לקריאה בתוך האתר. שורה ריקה = פסקה חדשה." }
          - { label: "קישור חיצוני (במקום תוכן)", name: url, widget: string, required: false, hint: "אם משאירים את התוכן ריק — הכרטיס יוביל לקישור הזה." }

  - name: podcast
    label: "פודקאסט"
    file: "src/content/podcast.yaml"
    icon: podcasts
    fields:
      - label: "כותרת הקטע"
        name: heading
        widget: object
        collapsed: true
        fields:
          - { label: "תווית קטנה", name: labelHe, widget: string }
          - { label: "כותרת", name: titleHe, widget: string }
          - { label: "כותרת משנה", name: subHe, widget: string, required: false }
          - { label: "תווית 'להאזנה'", name: ctaHe, widget: string }
      - label: "פודקאסטים"
        name: shows
        widget: list
        summary: "{{fields.nameHe}}"
        fields:
          - { label: "שם הפודקאסט", name: nameHe, widget: string }
          - { label: "תיאור", name: descHe, widget: text }
          - { label: "סטטוס (למשל: בקרוב — משאירים ריק כשהוא באוויר)", name: statusHe, widget: string, required: false }
          - { label: "קישור להאזנה", name: url, widget: string, required: false, hint: "אם 'סטטוס' מלא — לא צריך קישור." }

  - name: store
    label: "חנות"
    file: "src/content/store.yaml"
    icon: storefront
    fields:
      - label: "כותרת הקטע"
        name: heading
        widget: object
        collapsed: true
        fields:
          - { label: "תווית קטנה", name: labelHe, widget: string }
          - { label: "כותרת", name: titleHe, widget: string }
          - { label: "כותרת משנה", name: subHe, widget: string, required: false }
          - { label: "תווית כפתור", name: ctaHe, widget: string }
      - label: "מוצרים"
        name: items
        widget: list
        summary: "{{fields.titleHe}} — {{fields.price}}"
        fields:
          - { label: "שם המוצר", name: titleHe, widget: string }
          - { label: "מחיר (למשל: 90 ₪)", name: price, widget: string }
          - { label: "תמונה", name: image, widget: image }
          - { label: "תיאור", name: descHe, widget: text }
          - { label: "קישור לרכישה", name: buyUrl, widget: string, required: false, hint: "אם ריק — מפנה לוואטסאפ." }

  - name: contact_info
    label: "פרטי קשר ורשתות"
    file: "src/content/site.yaml"
    icon: alternate_email
    fields:
      - { label: "אימייל", name: email, widget: string, hint: "מופיע ככפתור אימייל." }
      - { label: "אינסטגרם (כתובת)", name: instagram, widget: string }
      - { label: "קישור וואטסאפ", name: whatsapp, widget: string, hint: "למשל https://wa.me/972XXXXXXXXX — גם כפתור הברירת־מחדל של כל הכפתורים." }
      - label: "רשתות חברתיות (מוצגות עם אייקון)"
        name: socials
        widget: list
        required: false
        summary: "{{fields.label}}"
        hint: "השם קובע איזה אייקון יוצג. שמות נתמכים: Instagram, WhatsApp, Facebook, YouTube, TikTok, Spotify, Email. כתובת ריקה = מוסתר."
        fields:
          - { label: "שם הרשת", name: label, widget: string }
          - { label: "כתובת (URL)", name: url, widget: string, required: false }

collections:
  # All site copy (Hebrew). Kept as a regular collection so the singletons above
  # render as 1-click sidebar items.
  - name: site_he
    label: "תוכן האתר"
    icon: article
    delete: false
    files:
      - name: site_he
        label: "כל הטקסטים באתר"
        file: "src/content/he.yaml"
        fields:
          - label: "תיאור לגוגל (SEO)"
            name: meta
            widget: object
            collapsed: true
            fields:
              - { label: "כותרת הדפדפן", name: title, widget: string }
              - { label: "תיאור בתוצאות החיפוש בגוגל", name: description, widget: string, hint: "זה הטקסט שמופיע מתחת לכותרת בגוגל." }
          - label: "תוויות התפריט"
            name: nav
            widget: object
            collapsed: true
            fields:
              - { label: "נעים להכיר", name: about, widget: string }
              - { label: "שירותי העסק", name: services, widget: string }
              - { label: "יומן מתעדכן", name: events, widget: string }
              - { label: "המלצות", name: words, widget: string }
              - { label: "פודקאסט", name: podcast, widget: string }
              - { label: "בלוג ומאמרים", name: blog, widget: string }
              - { label: "פרטי קשר", name: contact, widget: string }
              - { label: "חנות", name: shop, widget: string }
              - { label: "כפתור 'דברו איתי'", name: cta, widget: string }
              - { label: "כפתור פתיחת תפריט", name: menu, widget: string }
              - { label: "כפתור סגירת תפריט", name: close, widget: string }
              - { label: "דילוג לתוכן (נגישות)", name: skip, widget: string }
              # legacy labels kept for compatibility (not shown in the menu)
              - { label: "ישן: דרכי עבודה", name: practices, widget: string, required: false }
              - { label: "ישן: מעגלים", name: circles, widget: string, required: false }
              - { label: "ישן: הרצאה", name: story, widget: string, required: false }
              - { label: "ישן: תעריפים", name: pricing, widget: string, required: false }
              - { label: "ישן: שאלות נפוצות", name: faq, widget: string, required: false }
          - label: "פרופיל"
            name: profile
            widget: object
            collapsed: true
            fields:
              - { label: "שם", name: name, widget: string }
              - { label: "שם באנגלית", name: hebrewName, widget: string }
              - { label: "שורת פתיח קטנה", name: kicker, widget: string }
              - { label: "שורת תפקיד", name: role, widget: string }
              - { label: "פסקת פתיחה", name: lead, widget: text }
          - label: "עמוד הבית (Hero)"
            name: hero
            widget: object
            collapsed: true
            fields:
              - { label: "כפתור ראשי", name: ctaPrimary, widget: string }
              - { label: "כפתור משני", name: ctaSecondary, widget: string }
              - { label: "רמז גלילה (אפשר להשאיר ריק כדי להסתיר)", name: scroll, widget: string, required: false }
              - { label: "תיאור תמונת הבית (נגישות)", name: photoAlt, widget: string }
          - label: "רגע הנשימה"
            name: breath
            widget: object
            collapsed: true
            fields:
              - { label: "תווית קטנה (אפשר ריק)", name: label, widget: string, required: false }
              - { label: "כותרת", name: title, widget: string }
              - { label: "מילה — שאיפה", name: wordIn, widget: string }
              - { label: "מילה — החזקה", name: wordHold, widget: string }
              - { label: "מילה — נשיפה", name: wordOut, widget: string }
              - { label: "הערה", name: note, widget: text }
          - label: "רצועת תמונה"
            name: band
            widget: object
            collapsed: true
            fields:
              - { label: "תמונה", name: photo, widget: image }
              - { label: "כיתוב", name: caption, widget: string }
              - { label: "תיאור התמונה (נגישות)", name: alt, widget: string }
          - label: "נעים להכיר (אודות)"
            name: aboutSection
            widget: object
            collapsed: true
            fields:
              - { label: "תווית קטנה", name: label, widget: string }
              - { label: "כותרת", name: title, widget: string }
              - { label: "תמונה", name: photo, widget: image }
              - { label: "תיאור התמונה (נגישות)", name: photoAlt, widget: string }
              - { label: "פסקאות", name: paragraphs, widget: list, field: { label: פסקה, name: paragraph, widget: text } }
              - label: "עובדות קצרות (אפשר להשאיר ריק — אז לא יוצג)"
                name: facts
                widget: list
                required: false
                summary: "{{fields.label}} — {{fields.value}}"
                fields:
                  - { label: "כותרת", name: label, widget: string }
                  - { label: "ערך", name: value, widget: string }
          - label: "ההרצאה / הסיפור האישי"
            name: storySection
            widget: object
            collapsed: true
            fields:
              - { label: "תווית קטנה", name: label, widget: string }
              - { label: "כותרת", name: title, widget: string }
              - { label: "פתיח", name: lead, widget: text }
              - { label: "פסקאות", name: paragraphs, widget: list, field: { label: פסקה, name: paragraph, widget: text } }
              - { label: "שורת מטא", name: meta, widget: string }
              - label: "תמונות"
                name: photos
                widget: list
                summary: "{{fields.alt}}"
                fields:
                  - { label: "תמונה", name: src, widget: image }
                  - { label: "תיאור התמונה (נגישות)", name: alt, widget: string }
          - label: "המלצות"
            name: wordsSection
            widget: object
            collapsed: true
            fields:
              - { label: "תווית קטנה", name: label, widget: string }
              - label: "המלצות (מוצגות בסליידר)"
                name: items
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: "ההמלצה", name: quote, widget: text }
                  - { label: "שם הממליצ/ה", name: name, widget: string }
          - label: "באנר שיחת היכרות חינם"
            name: freeCall
            widget: object
            collapsed: true
            fields:
              - { label: "תווית קטנה", name: label, widget: string }
              - { label: "כותרת", name: title, widget: string }
              - { label: "טקסט", name: body, widget: text }
              - { label: "תווית כפתור", name: cta, widget: string }
              - { label: "הערה (למשל: 30 דק׳ · נשים וזוגות)", name: note, widget: string }
          - label: "טקסט קטע פרטי הקשר"
            name: contact
            widget: object
            collapsed: true
            fields:
              - { label: "כותרת", name: line, widget: string }
              - { label: "טקסט משנה", name: sub, widget: string }
              - { label: "טקסט כפתור הוואטסאפ (לא הקישור)", name: whatsapp, widget: string, hint: "הקישור עצמו נמצא ב'פרטי קשר ורשתות'." }
              - { label: "ישן: טקסט אינסטגרם", name: instagram, widget: string, required: false }
          - label: "כותרת תחתונה (Footer)"
            name: footer
            widget: object
            collapsed: true
            fields:
              - { label: "מקום", name: place, widget: string }
              - { label: "קרדיט", name: credit, widget: string }
